<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>liberstack.github.io/MDEditor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="toolbar">
    <div class="toolbar-left">
      <div class="toolbar-brand">MD<span>Editor</span> | github.com/liberstack</div>
      <button id="btnSupport" class="btn-support" title="Apoiar o projeto">💰</button>
    </div>

    <div class="toolbar-actions">
      <input type="file" id="importInput" accept=".md,.markdown,text/markdown" hidden>
      <button id="btnImport" class="btn">Import .md</button>
      <button id="btnExportMd" class="btn">Export .md</button>
      <button id="btnExportHtml" class="btn">Export .html</button>
      <button id="btnExportPdf" class="btn btn-accent">Export .pdf</button>
    </div>
  </header>

  <main class="workspace" id="workspace">
    <section class="pane pane-editor" id="editorPane">
      <div class="pane-label">Editor</div>
      <textarea id="editor" spellcheck="false" placeholder="# Escreva seu markdown aqui..."></textarea>
    </section>

    <div class="divider" id="divider" role="separator" aria-orientation="vertical"></div>

    <section class="pane pane-preview" id="previewPane">
      <div class="pane-label">Preview</div>
      <div id="preview" class="markdown-body"></div>
    </section>
  </main>

  <div id="supportModal" class="modal-overlay" hidden>
    <div class="modal">
      <button id="modalClose" class="modal-close" aria-label="Fechar">&times;</button>
      <p class="modal-text">💰<br>Gostou do projeto? Considere apoiar via Pix/PicPay ↓</p>
      <div class="modal-email-row">
        <code id="pixEmail">brgui86@gmail.com</code>
        <button id="btnCopyEmail" class="btn btn-accent">Copiar</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="ui.js"></script>
  <script src="export.js"></script>
  <script src="coffee.js"></script>
</body>

</html>
